services:
  - type: web
    name: e3i-tactical-intelligence
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: E3I_LLM_TIMEOUT_SECONDS
        value: "18"
      # Render fica atras de proxy: usa X-Forwarded-For para o rate limit
      # distinguir usuarios reais em vez de agrupar todos no IP do proxy.
      - key: E3I_TRUST_PROXY
        value: "1"
